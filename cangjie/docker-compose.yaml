# =============================================================================
# cangjie/docker-compose.yaml — Cangjie Development Container
# =============================================================================
# Standalone compose file for the Cangjie development container
# =============================================================================

services:
  cangjie-develop:
    image: ghcr.io/${GITHUB_ORG:-ertu426}/cangjie:${VERSION:-latest}
    pull_policy: ${PULL_POLICY:-if_not_present}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: dgen-cangjie-dev
    restart: unless-stopped
    
    ports:
      - "${CANGJIE_HTTP_PORT:-30180}:8080"
      - "${CANGJIE_SSH_PORT:-30122}:2222"
    
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - LANG=zh_CN.UTF-8
      - LANGUAGE=zh_CN:zh:en
      - SHELL=/usr/bin/fish
    
    deploy:
      resources:
        limits:
          cpus: '${CANGJIE_CPU_LIMIT:-2}'
          memory: ${CANGJIE_MEM_LIMIT:-4G}
    
    healthcheck:
      test: ["CMD", "bash", "-c", "command -v cjc && curl -f http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    shm_size: 256mb
    stdin_open: true
    tty: true