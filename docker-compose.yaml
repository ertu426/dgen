# =============================================================================
# DGen — Root Docker Compose
# =============================================================================
# Orchestrates all three development containers:
#   default    — Universal dev environment (Code Server + Fish Shell)
#   cangjie    — Cangjie language SDK environment
#   vite       — Node.js / Vite frontend environment
#
# Usage:
#   docker compose up -d                   # start all
#   docker compose up -d default-develop   # start one
#   docker compose --profile devcontainer up -d   # all for Dev Containers
# =============================================================================

include:
  - path: ./default/docker-compose.yaml
    service: default-develop
  - path: ./cangjie/docker-compose.yaml
    service: cangjie-develop
  - path: ./vite/docker-compose.yaml
    service: vite-develop


