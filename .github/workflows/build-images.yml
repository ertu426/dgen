name: Build Multi-Arch Docker Images

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  schedule:
    - cron: '30 0 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-default-base:
    name: Build Default Base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push default/base
        uses: docker/build-push-action@v7
        with:
          context: ./default/base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/default:latest
            ghcr.io/${{ github.repository_owner }}/default:base
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-default-others:
    name: Build Default ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build-default-base
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        include:
          - name: "dev"
            context: ./default/dev
            tags: dev,dood,docker-out-of-docker
            description: "Default with Docker-out-of-Docker"
          - name: "ide"
            context: ./default/ide
            tags: ide,code,code-server
            description: "Default with Code Server"
          - name: "ssh"
            context: ./default/ssh
            tags: ssh,sshd
            description: "Default with SSH"
      fail-fast: false 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate tags
        id: generate-tags
        run: |
          if [ "${{ matrix.name }}" = "dev" ]; then
            echo "tags=ghcr.io/${{ github.repository_owner }}/default:dev" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.name }}" = "ide" ]; then
            echo "tags=ghcr.io/${{ github.repository_owner }}/default:ide,ghcr.io/${{ github.repository_owner }}/default:code,ghcr.io/${{ github.repository_owner }}/default:code-server" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.name }}" = "ssh" ]; then
            echo "tags=ghcr.io/${{ github.repository_owner }}/default:ssh,ghcr.io/${{ github.repository_owner }}/default:sshd" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.generate-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-cangjie:
    name: Build Cangjie ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build-default-others
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        include:
          - name: "base"
            context: ./cangjie/base
            tags: latest,base
            description: "Cangjie Development Environment"
          - name: "dev"
            context: ./cangjie/dev
            tags: dev,dood,docker-out-of-docker
            description: "Cangjie with Docker-out-of-Docker"
          - name: "ide"
            context: ./cangjie/ide
            tags: ide,code,code-server
            description: "Cangjie with Code Server"
          - name: "ssh"
            context: ./cangjie/ssh
            tags: ssh,sshd
            description: "Cangjie with SSH"
          - name: "builder"
            context: ./cangjie/builder
            tags: builder,build,sdk
            description: "Cangjie Builder (SDK)"
      fail-fast: false 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate tags
        id: generate-tags
        run: |
          if [ "${{ matrix.name }}" = "base" ]; then
            echo "tags=ghcr.io/${{ github.repository_owner }}/cangjie:latest,ghcr.io/${{ github.repository_owner }}/cangjie:base" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.name }}" = "dev" ]; then
            echo "tags=ghcr.io/${{ github.repository_owner }}/cangjie:dev" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.name }}" = "ide" ]; then
            echo "tags=ghcr.io/${{ github.repository_owner }}/cangjie:ide,ghcr.io/${{ github.repository_owner }}/cangjie:code,ghcr.io/${{ github.repository_owner }}/cangjie:code-server" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.name }}" = "ssh" ]; then
            echo "tags=ghcr.io/${{ github.repository_owner }}/cangjie:ssh,ghcr.io/${{ github.repository_owner }}/cangjie:sshd" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.name }}" = "builder" ]; then
            echo "tags=ghcr.io/${{ github.repository_owner }}/cangjie:builder,ghcr.io/${{ github.repository_owner }}/cangjie:build,ghcr.io/${{ github.repository_owner }}/cangjie:sdk" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push cangjie/${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.generate-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-vite:
    name: Build Vite ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build-default-others
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        include:
          - name: "base"
            context: ./vite/base
            tags: latest,base
            description: "VitePlus Development Environment"
          - name: "dev"
            context: ./vite/dev
            tags: dev,dood,docker-out-of-docker
            description: "VitePlus with Docker-out-of-Docker"
          - name: "ide"
            context: ./vite/ide
            tags: ide,code,code-server
            description: "VitePlus with Code Server"
          - name: "ssh"
            context: ./vite/ssh
            tags: ssh,sshd
            description: "VitePlus with SSH"
      fail-fast: false 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate tags
        id: generate-tags
        run: |
          if [ "${{ matrix.name }}" = "base" ]; then
            echo "tags=ghcr.io/${{ github.repository_owner }}/vite:latest,ghcr.io/${{ github.repository_owner }}/vite:base" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.name }}" = "dev" ]; then
            echo "tags=ghcr.io/${{ github.repository_owner }}/vite:dev" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.name }}" = "ide" ]; then
            echo "tags=ghcr.io/${{ github.repository_owner }}/vite:ide,ghcr.io/${{ github.repository_owner }}/vite:code,ghcr.io/${{ github.repository_owner }}/vite:code-server" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.name }}" = "ssh" ]; then
            echo "tags=ghcr.io/${{ github.repository_owner }}/vite:ssh,ghcr.io/${{ github.repository_owner }}/vite:sshd" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push vite/${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.generate-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: Image Size Summary
    runs-on: ubuntu-latest
    needs: [build-default-base, build-default-others, build-cangjie, build-vite]
    if: always()
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Get image sizes
        id: sizes
        run: |
          echo "## Image Size Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag | amd64 | arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|-------|-------|" >> $GITHUB_STEP_SUMMARY
          
          get_size() {
            local image="$1"
            local tag="$2"
            local arch="$3"
            local digest=$(crane manifest --platform linux/$arch $image:$tag 2>/dev/null | jq -r '.manifests[0].digest // empty')
            if [ -n "$digest" ]; then
              local size=$(crane manifest $image@$digest 2>/dev/null | jq -r '.layers | map(.size) | add // 0')
              if [ "$size" != "null" ] && [ "$size" -gt 0 ]; then
                echo "$(numfmt --to=iec-i --suffix=B $size)"
              else
                echo "N/A"
              fi
            else
              echo "N/A"
            fi
          }
          
          echo "### default" >> $GITHUB_STEP_SUMMARY
          for tag in latest base dev ide ssh; do
            amd64=$(get_size ghcr.io/${{ github.repository_owner }}/default $tag amd64)
            arm64=$(get_size ghcr.io/${{ github.repository_owner }}/default $tag arm64)
            echo "| default | $tag | $amd64 | $arm64 |" >> $GITHUB_STEP_SUMMARY
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### cangjie" >> $GITHUB_STEP_SUMMARY
          for tag in latest base dev ide ssh builder; do
            amd64=$(get_size ghcr.io/${{ github.repository_owner }}/cangjie $tag amd64)
            arm64=$(get_size ghcr.io/${{ github.repository_owner }}/cangjie $tag arm64)
            echo "| cangjie | $tag | $amd64 | $arm64 |" >> $GITHUB_STEP_SUMMARY
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### vite" >> $GITHUB_STEP_SUMMARY
          for tag in latest base dev ide ssh; do
            amd64=$(get_size ghcr.io/${{ github.repository_owner }}/vite $tag amd64)
            arm64=$(get_size ghcr.io/${{ github.repository_owner }}/vite $tag arm64)
            echo "| vite | $tag | $amd64 | $arm64 |" >> $GITHUB_STEP_SUMMARY
          done