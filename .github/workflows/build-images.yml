name: Build Multi-Arch Docker Images

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  schedule:
    - cron: '30 0 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-default:
    name: Build Base (default)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Buildx Cache
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-default-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-default-

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./default
          file: ./default/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=Default programming environment
          tags: ghcr.io/${{ github.repository_owner }}/default:latest,ghcr.io/${{ github.repository_owner }}/default:${{ github.run_id }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache to prevent unbounded growth
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  build-others:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build-default
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        include:
          - name: "cangjie"        
            tag: "latest"
            description: "Cangjie Programming Environment"
          - name: "cangjie"
            tag: "build"
            description: "Cangjie Programming Environment (Build)"
          - name: "vite"        
            tag: "latest"
            description: "VitePlus Programming Environment"
      fail-fast: false 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Buildx Cache
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.name }}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.name }}
          file: ./${{ matrix.name }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=${{ matrix.description }}
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ matrix.tag }},ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ github.run_id }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache to prevent unbounded growth
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
