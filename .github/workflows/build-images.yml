# =============================================================================
# build-images.yml — Docker Image CI/CD Pipeline
# =============================================================================
# Features:
#   - Multi-architecture support (amd64, arm64)
#   - Sequential build: default first, then concurrent builds
#   - OCI annotations for rich metadata
#   - Build caching for faster builds
#   - Automated version tagging
# =============================================================================

name: Build and Push Docker Images

on:
  # Scheduled daily build at 10 PM (Beijing time)
  schedule:
    - cron: '0 14 * * *'  # 22:00 Beijing time = 14:00 UTC
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom tag (default: latest)'
        required: false
        default: 'latest'
        type: string
      build_default_only:
        description: 'Build default image only'
        required: false
        default: 'false'
        type: boolean

  # Build on push to main
  push:
    branches:
      - main
    paths:
      - 'default/**'
      - 'cangjie/**'
      - '.github/workflows/**'

env:
  REGISTRY: ghcr.io
  TAG: ${{ github.event.inputs.tag || 'latest' }}

jobs:
  # =============================================================================
  # Job 1: Build Default Image (Sequential - Must Complete First)
  # =============================================================================
  build-default:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_default_only != 'true' }}
    
    permissions:
      contents: read
      packages: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        id: buildx

      - name: Inspect Docker builder
        run: |
          echo "Buildx name: ${{ steps.buildx.outputs.name }}"
          docker buildx ls

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-default-${{ hashFiles('default/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-default-

      - name: Build and push default image
        uses: docker/build-push-action@v6
        with:
          context: ./default
          file: ./default/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/default:${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/default:${{ github.run_id }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/default:build-${{ github.run_number }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          # Rich OCI annotations
          annotations: |
            org.opencontainers.image.title=DGen Default Development Environment
            org.opencontainers.image.title.zh=DGen 通用开发环境
            org.opencontainers.image.description=A comprehensive development container with Code Server, Fish shell, and modern CLI tools. Perfect for remote development via SSH or VS Code Dev Containers.
            org.opencontainers.image.description.zh=全栈开发容器，预装 Code Server、Fish Shell 和现代化 CLI 工具。支持 SSH 远程连接和 VS Code Dev Containers，即开即用。
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.version=${{ env.TAG }}
            org.opencontainers.image.vendor=DGen
            org.opencontainers.image.base.name=debian:trixie-slim
            org.opencontainers.imagesimilarity.source=github.com/${{ github.repository }}
          provenance: true
          sbom: true

      - name: Update Docker layers cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Generate build summary
        if: always()
        run: |
          echo "## ✅ Default Image Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | `${{ env.REGISTRY }}/${{ github.repository_owner }}/default:${{ env.TAG }}` |" >> $GITHUB_STEP_SUMMARY
          echo "| Platforms | amd64, arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | ${{ env.TAG }} |" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # Job 2: Build Cangjie Image (Concurrent with Other Non-Default Jobs)
  # =============================================================================
  build-cangjie:
    runs-on: ubuntu-latest
    needs: build-default  # Depends on default build
    
    permissions:
      contents: read
      packages: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        id: buildx

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-cangjie-${{ hashFiles('cangjie/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-cangjie-

      - name: Build and push cangjie image
        uses: docker/build-push-action@v6
        with:
          context: ./cangjie
          file: ./cangjie/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/cangjie:${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/cangjie:${{ github.run_id }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/cangjie:build-${{ github.run_number }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          # Rich OCI annotations
          annotations: |
            org.opencontainers.image.title=DGen Cangjie Development Environment
            org.opencontainers.image.title.zh=DGen 仓颉开发环境
            org.opencontainers.image.description=Development container for Cangjie programming language with SDK, stdx, and uv Python management. Supports x86_64 and ARM64 architectures.
            org.opencontainers.image.description.zh=仓颉编程语言开发容器，预装 SDK、标准库和 uv Python 管理工具。支持 x86_64 和 ARM64 架构。
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.version=${{ env.TAG }}
            org.opencontainers.image.vendor=DGen
            org.opencontainers.image.base.name=debian:trixie-slim
            org.opencontainers.imagesimilarity.source=github.com/${{ github.repository }}
          provenance: true
          sbom: true

      - name: Update Docker layers cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Generate build summary
        if: always()
        run: |
          echo "## ✅ Cangjie Image Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | `${{ env.REGISTRY }}/${{ github.repository_owner }}/cangjie:${{ env.TAG }}` |" >> $GITHUB_STEP_SUMMARY
          echo "| Platforms | amd64, arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | ${{ env.TAG }} |" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # Job 3: Build Default Only (when requested)
  # =============================================================================
  build-default-only:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_default_only == 'true' }}
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-default-${{ hashFiles('default/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-default-

      - name: Build and push default image
        uses: docker/build-push-action@v6
        with:
          context: ./default
          file: ./default/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/default:${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/default:${{ github.run_id }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          annotations: |
            org.opencontainers.image.title=DGen Default Development Environment
            org.opencontainers.image.title.zh=DGen 通用开发环境
            org.opencontainers.image.description=A comprehensive development container with Code Server, Fish shell, and modern CLI tools.
            org.opencontainers.image.description.zh=全栈开发容器，预装 Code Server、Fish Shell 和现代化 CLI 工具。
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=DGen

  # =============================================================================
  # Job 4: Final Summary
  # =============================================================================
  summary:
    runs-on: ubuntu-latest
    if: always()
    needs: [build-default, build-cangjie, build-default-only]
    
    steps:
      - name: Generate final summary
        run: |
          echo "## 📦 Docker Images Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| default | ${{ needs.build-default.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| cangjie | ${{ needs.build-cangjie.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Tags" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ github.repository_owner }}/default:${{ env.TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ github.repository_owner }}/cangjie:${{ env.TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Architectures" >> $GITHUB_STEP_SUMMARY
          echo "- linux/amd64 (x86_64)" >> $GITHUB_STEP_SUMMARY
          echo "- linux/arm64 (aarch64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Trigger" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${{ env.TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Run ID: \`${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow: \`${{ github.workflow }}\`" >> $GITHUB_STEP_SUMMARY
          
          # Exit with error if any job failed
          if [ "${{ needs.build-default.result }}" == "failure" ] || [ "${{ needs.build-cangjie.result }}" == "failure" ]; then
            echo ""
            echo "❌ One or more builds failed!"
            exit 1
          fi
