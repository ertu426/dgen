name: Test Build

on:
  push:
    branches: [ "develop" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-default-base:
    name: Test Build Default Base
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build default/base (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./default/base
          platforms: linux/amd64
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/default:test-base
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-default-others:
    name: Test Build Default ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: test-default-base
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - name: "ide"
            context: ./default/ide
          - name: "ssh"
            context: ./default/ssh
          - name: "ide-ssh"
            context: ./default/ide-ssh
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build default/${{ matrix.name }} (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/default:test-${{ matrix.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-cangjie:
    name: Test Build Cangjie ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - name: "base"
            context: ./cangjie/base
          - name: "ide"
            context: ./cangjie/ide
          - name: "ssh"
            context: ./cangjie/ssh
          - name: "ide-ssh"
            context: ./cangjie/ide-ssh
          - name: "builder"
            context: ./cangjie/builder
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build cangjie/${{ matrix.name }} (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/cangjie:test-${{ matrix.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-vite:
    name: Test Build Vite ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - name: "base"
            context: ./vite/base
          - name: "ide"
            context: ./vite/ide
          - name: "ssh"
            context: ./vite/ssh
          - name: "ide-ssh"
            context: ./vite/ide-ssh
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build vite/${{ matrix.name }} (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/vite:test-${{ matrix.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
