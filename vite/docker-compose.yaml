# =============================================================================
# default/docker-compose.yaml — Default Development Container
# =============================================================================
# Standalone compose file for the default development container
# =============================================================================

services:
  vite-develop:
    image: ghcr.io/${GITHUB_ORG:-ertu426}/vite:${VERSION:-latest}
    pull_policy: ${PULL_POLICY:-if_not_present}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: dgen-vite-dev
    restart: unless-stopped
    
    ports:
      - "${HTTP_PORT:-30280}:8080"
      - "${SSH_PORT:-30222}:2222"
    
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - LANG=zh_CN.UTF-8
      - LANGUAGE=zh_CN:zh:en
      - SHELL=/usr/bin/fish
      - PASSWORD=${CODE_SERVER_PASSWORD:-dev123456}

    deploy:
      resources:
        limits:
          cpus: '${DEFAULT_CPU_LIMIT:-2}'
          memory: ${DEFAULT_MEM_LIMIT:-4G}
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    shm_size: 256mb
    stdin_open: true
    tty: true